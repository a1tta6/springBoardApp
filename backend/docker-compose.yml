version: '3.9'

services:

  postgres:
    image: postgis/postgis:14-3.5-alpine
    container_name: springBoardApp_postgres
    hostname: springBoardApp_postgres
    expose:
      - 5432
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=${DB_URL}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USERNAME=${DB_USER}
    env_file:
      - .env
    networks:
      springBoardApp_network:


networks:
  springBoardApp_network:
    name: 'springBoardApp_network'